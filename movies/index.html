<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My Watchlist</h1>
        <div class="header-buttons">
            <button id="btn-add">+ Add Title</button>
            <button id="btn-clear">Clear All</button>
        </div>
    </header>

    <main>
        <section id="card-grid-section">
            <!-- Cards rendered here by JS -->
        </section>
    </main>

    <dialog id="watchlist-dialog">
        <form id="watchlist-form">
            <h2>Add New Title</h2>

            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>

            <label for="type">Type</label>
            <select id="type" name="type">
                <option value="Movie">Movie</option>
                <option value="TV Show">TV Show</option>
            </select>

            <label for="genre">Genre</label>
            <input type="text" id="genre" name="genre" required>

            <label for="rating">Rating (0-10)</label>
            <input type="number" id="rating" name="rating" min="0" max="10" value="0">

            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="Want to Watch">Want to Watch</option>
                <option value="Watching">Watching</option>
                <option value="Completed">Completed</option>
            </select>

            <div class="form-buttons">
                <button type="submit">Add</button>
                <button type="button" id="close-dialog">Cancel</button>
            </div>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
